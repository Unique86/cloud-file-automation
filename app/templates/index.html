<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cloud File Automation</title>


<link rel="stylesheet" href="/static/style.css">


</head>

<body>

<h2>☁️ Cloud File Automation</h2>

<div class="card">

<div id="dropZone" class="drop-zone">
    <p>📁 Drag & Drop Files Here</p>
    <p>or</p>

    <input
        type="file"
        id="fileInput"
        multiple
        hidden
    >

    <button type="button" onclick="document.getElementById('fileInput').click()">
        Browse Files
    </button>

    <p id="selectedFiles" class="status">
        No files selected
    </p>
</div>
<select id="actionSelect">
  <option value="image-to-pdf">Image → PDF</option>
  <option value="pdf-to-docx">PDF → DOCX</option>
  <option value="docx-to-pdf">DOCX → PDF</option>
  <option value="merge-pdfs">Merge PDFs</option>
</select>

<button onclick="upload()">Run</button>

<p id="status" class="status">Status: Ready</p>

</div>

<div class="card">

<h3>Converted Files</h3>
<div id="fileList"></div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
